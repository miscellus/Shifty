<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEC PC-8201A LCD Shader</title>
    <style>
        :root {
            --lcd-bg: rgb(168 172 164);
            --lcd-pixel: rgb(41 42 40);
            --lcd-shadow: rgb(129 130 124);
            --panel-bg: #1e1e1e;
            --border-color: #444;
        }

        *, *:before, *:after {
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            margin: 0;
            overflow: hidden; /* Prevent body scroll, handle scrolling in panels */
        }

        body {
            background: #121212; /* Dark theme wrapper */
            display: flex;
            flex-direction: column;
            padding: 12px;
            gap: 12px;
            font-family: sans-serif;
        }

        /* --- Layout Architecture --- */
        .top-panel {
            flex: 0 0 auto;
            background: var(--lcd-pixel);
            padding: 12px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            border: 1px solid var(--border-color);
        }

        .workspace {
            flex: 1 1 auto;
            display: grid;
            grid-template-columns: 1fr 350px; /* Code gets remaining space, Sidebar gets 350px */
            gap: 12px;
            min-height: 0; /* CRITICAL: Allows flex children to shrink/scroll */
        }

        .left-pane {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 0;
        }

        .right-pane {
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 0;
        }

        /* --- Components --- */
        canvas {
            border-radius: 6px;
            border: solid 8px var(--lcd-bg);
            box-shadow:
                0 8px 10px rgba(0,0,0,0.6),
                inset 0 0 3px rgba(0,0,0,0.8);
            aspect-ratio: 240 / 64;
            width: 100%;
            max-width: 800px; /* Keeps it from stretching too far on ultrawides */
        }

        .debug-controls {
            flex: 0 0 auto;
            background: var(--panel-bg);
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
        }

        .debug-controls button {
            padding: 6px 12px;
            margin-right: 5px;
            cursor: pointer;
            background: #333;
            color: #eee;
            border: 1px solid #555;
            border-radius: 4px;
            font-weight: bold;
        }

        .debug-controls button::after {
            display: inline;
            content: attr(data-key);
            color: #bbb;
            font-weight: normal;
            padding-left: 0.5em;
        }

        .debug-controls button:hover { background: #444; }

        .source-viewer {
            flex: 1 1 auto;
            display: flex;
            flex-direction: column;
            font-family: monospace;
            background: var(--panel-bg);
            color: #d4d4d4;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
        }

        /* --- Source Code Lines --- */
        .source-line {
            display: flex;          /* CRITICAL: Puts gutter and code side-by-side */
            align-items: stretch;
            cursor: pointer;
            white-space: pre;       /* Preserves your assembly indentation */
            line-height: 1.5;
        }

        .source-line:hover {
            background: #2a2d2e;
        }

        .source-line.active {
            background: #37373d;
            outline: 1px solid #75715e;
        }

        .gutter {
            flex: 0 0 40px;         /* Fixed width: won't shrink, won't grow */
            background: #252526;
            color: #858585;
            text-align: right;
            padding: 0 8px;
            margin-right: 12px;
            user-select: none;
            position: relative;
            border-right: 1px solid var(--border-color); /* Optional: A nice subtle divider */
        }

        .gutter.breakpoint {
            background: #e51400;
            color: white;
        }

        .code-text {
            flex: 1;                /* Allows the code text to fill the remaining horizontal space */
            padding-right: 10px;
        }

        #file-selector {
            padding: 6px;
            background: #252526;
            color: white;
            border: none;
            border-bottom: 1px solid var(--border-color);
            outline: none;
        }

        .source-code {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        /* --- CPU Debugger --- */
        .cpu-debugger {
            flex: 0 0 auto;
            background: rgba(26, 27, 24, 0.95);
            border: 2px solid var(--lcd-shadow);
            border-radius: 6px;
            padding: 12px 16px;
            color: #a8aca4;
            font-family: monospace;
            font-size: 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            user-select: none;
        }

        .cpu-debugger hr {
            border: none;
            border-top: 1px solid #444;
            margin: 4px 0;
            width: 100%;
        }

        /* Refactored Grids to fit inside a sidebar */
        .cpu-section {
            display: grid;
            column-gap: 12px;
            row-gap: 6px;
            align-items: center;
        }

        .cpu-section.top-regs { grid-template-columns: repeat(2, auto 1fr); }
        .cpu-section.registers { grid-template-columns: repeat(4, auto 1fr); }
        .cpu-section.pairs { grid-template-columns: repeat(3, auto 1fr); }
        .cpu-section.flags { grid-template-columns: repeat(3, auto 1fr); }

        .cpu-label {
            color: #81827c;
            font-weight: bold;
            text-align: right;
        }

        .cpu-val { color: #d1d5cb; }
        .cpu-val.flag { color: #555c51; }
        .cpu-val.flag.active {
            color: #85ff7a;
            text-shadow: 0 0 4px rgba(133, 255, 122, 0.4);
        }

        /* --- Memory Viewer Placeholder --- */
        .memory-viewer {
            flex: 1 1 auto;
            background: var(--panel-bg);
            border: 2px dashed #555;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #777;
            font-family: monospace;
            min-height: 150px;
        }

        /* --- Touch Controls (Preserved for Mobile) --- */
        .touch-controls {
            display: none;
            grid-template-areas:
                ". up ."
                "left . right"
                ". down .";
            grid-template-columns: repeat(3, clamp(60px, 16vw, 85px));
            grid-template-rows: repeat(3, clamp(60px, 16vw, 85px));
            gap: 4px;
            user-select: none;
            -webkit-user-select: none;
            opacity: 0.4;
        }

        .touch-btn {
            background: rgba(255, 255, 255, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            color: #8c9685;
            font-size: 2em;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
            cursor: pointer;
        }

        .touch-btn:active {
            background: #1a1b18;
            border-color: #232521;
            color: #555c51;
            transform: translateY(2px);
        }

        .touch-btn.up { grid-area: up; }
        .touch-btn.left { grid-area: left; }
        .touch-btn.right { grid-area: right; }
        .touch-btn.down { grid-area: down; }

        /* Responsive Breakpoint */
        @media (max-width: 900px) {
            .workspace {
                grid-template-columns: 1fr; /* Stack columns on small screens */
            }
            .right-pane {
                flex-direction: row; /* Put debugger and memory side-by-side if stacked */
            }
        }

        @media (pointer: coarse), (max-width: 1024px) {
            .touch-controls {
                display: grid;
                position: fixed;
                bottom: 24px;
                right: 24px;
                z-index: 100;
            }
        }
    </style>
</head>
<body>

    <header class="top-panel">
        <canvas id="canvas"></canvas>
    </header>

    <main class="workspace">

        <div class="left-pane">
            <div class="debug-controls">
                <button id="btn-run-pause" data-key="F7">Pause</button>
                <button id="btn-step-into" data-key="F11">Step Into</button>
                <button id="btn-step-over" data-key="F10">Step Over</button>
                <button id="btn-step-out" data-key="Shift+F11">Step Out</button>
            </div>

            <div class="source-viewer">
                <select id="file-selector">
                    <option>main.asm</option>
                </select>
                <div id="source-code" class="source-code">
                    </div>
            </div>
        </div>

        <div class="right-pane">

            <div id="cpu-debugger" class="cpu-debugger">
                <div class="cpu-section top-regs">
                    <div class="cpu-label">PC</div><div class="cpu-val" id="cpu-pc">0000</div>
                    <div class="cpu-label">SP</div><div class="cpu-val" id="cpu-sp">0000</div>
                </div>
                <hr>
                <div class="cpu-section registers">
                    <div class="cpu-label">A</div><div class="cpu-val" id="cpu-a">00</div>
                    <div class="cpu-label">B</div><div class="cpu-val" id="cpu-b">00</div>
                    <div class="cpu-label">C</div><div class="cpu-val" id="cpu-c">00</div>
                    <div class="cpu-label">D</div><div class="cpu-val" id="cpu-d">00</div>
                    <div class="cpu-label">E</div><div class="cpu-val" id="cpu-e">00</div>
                    <div class="cpu-label">H</div><div class="cpu-val" id="cpu-h">00</div>
                    <div class="cpu-label">L</div><div class="cpu-val" id="cpu-l">00</div>
                </div>
                <hr>
                <div class="cpu-section pairs">
                    <div class="cpu-label">BC</div><div class="cpu-val" id="cpu-bc">0000</div>
                    <div class="cpu-label">DE</div><div class="cpu-val" id="cpu-de">0000</div>
                    <div class="cpu-label">HL</div><div class="cpu-val" id="cpu-hl">0000</div>
                </div>
                <hr>
                <div class="cpu-section flags">
                    <div class="cpu-label">S</div><div class="cpu-val flag" id="cpu-s">0</div>
                    <div class="cpu-label">Z</div><div class="cpu-val flag" id="cpu-z">0</div>
                    <div class="cpu-label">AC</div><div class="cpu-val flag" id="cpu-ac">0</div>
                    <div class="cpu-label">P</div><div class="cpu-val flag" id="cpu-p">0</div>
                    <div class="cpu-label">CY</div><div class="cpu-val flag" id="cpu-cy">0</div>
                </div>
            </div>

            <div id="memory-viewer" class="memory-viewer">
                [ Memory View Placeholder ]
            </div>

        </div>
    </main>

    <div class="touch-controls">
        <button class="touch-btn up" data-row="6" data-col="1">↑</button>
        <button class="touch-btn left" data-row="6" data-col="3">←</button>
        <button class="touch-btn right" data-row="6" data-col="4">→</button>
        <button class="touch-btn down" data-row="6" data-col="2">↓</button>
    </div>

    <script src="web_shifty.js"></script>
</body>
</html>
