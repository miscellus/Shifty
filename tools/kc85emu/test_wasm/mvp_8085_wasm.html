<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wasm Canvas Shared Memory Example</title>
    <style>
        *, *:before, *:after {
            box-sizing: border-box;
        }
        html { height: 100%; }
        body {
            background: #7e8776;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            margin: 0;
            padding: 1em;
        }
        canvas {
            border: 4px solid #000;
            image-rendering: pixelated;
            aspect 240/64;
            width: 100%;
        }
    </style>
</head>
<body>

    <canvas id="canvas" width="240" height="64"></canvas>

    <script>
        const ctx = canvas.getContext('2d');
        const WIDTH = 240;
        const HEIGHT = 64;

        let frame = 0;

        async function initWasm() {
            // 1. Fetch and compile the standalone wasm file
            const response = await fetch('mvp_8085_wasm.wasm');
            const bytes = await response.arrayBuffer();
            const { instance } = await WebAssembly.instantiate(bytes);

            const { init_machine, get_canvas_buffer, run_frame, memory, set_key_state } = instance.exports;

            // Initialize the 8085 state and load the embedded binary
            const cryptoArray = new Uint16Array(1);
            window.crypto.getRandomValues(cryptoArray);
            const randomSeed = cryptoArray[0];
            init_machine(randomSeed);

            const bufferPointer = get_canvas_buffer();
            const bufferLength = WIDTH * HEIGHT * 4;
            const imgData = ctx.createImageData(WIDTH, HEIGHT);

            let timeLast = performance.now();
            let clockPeriodDebt = 0;

            // --- PC-8201A Keyboard Matrix Mapping ---
            // Maps modern JS KeyboardEvent.code to [row, column]
            const keyMap = {
                // PA0
                'KeyZ': [0, 0], 'KeyX': [0, 1], 'KeyC': [0, 2], 'KeyV': [0, 3],
                'KeyB': [0, 4], 'KeyN': [0, 5], 'KeyM': [0, 6], 'Comma': [0, 7],

                // PA1
                'KeyA': [1, 0], 'KeyS': [1, 1], 'KeyD': [1, 2], 'KeyF': [1, 3],
                'KeyG': [1, 4], 'KeyH': [1, 5], 'KeyJ': [1, 6], 'KeyK': [1, 7],

                // PA2
                'KeyQ': [2, 0], 'KeyW': [2, 1], 'KeyE': [2, 2], 'KeyR': [2, 3],
                'KeyT': [2, 4], 'KeyY': [2, 5], 'KeyU': [2, 6], 'KeyI': [2, 7],

                // PA3
                'KeyO': [3, 0], 'KeyP': [3, 1], 'Quote': [3, 2], // @ symbol on PC-8201
                'BracketLeft': [3, 3], 'Backslash': [3, 4], 'BracketRight': [3, 5],
                'Backquote': [3, 6], // ^ symbol
                'Slash': [3, 7],     // ? symbol

                // PA4
                'Digit1': [4, 0], 'Digit2': [4, 1], 'Digit3': [4, 2], 'Digit4': [4, 3],
                'Digit5': [4, 4], 'Digit6': [4, 5], 'Digit7': [4, 6], 'Digit8': [4, 7],

                // PA5
                'Digit9': [5, 0], 'Digit0': [5, 1], 'Semicolon': [5, 2], 'Minus': [5, 3],
                'Equal': [5, 4], 'Space': [5, 5], 'Insert': [5, 6], // PAST/INS
                'Period': [5, 7], // Map PC-8201 period somewhere if needed, but it shares >.

                // PA6
                'Backspace': [6, 0], 'ArrowUp': [6, 1], 'ArrowDown': [6, 2], 'ArrowLeft': [6, 3],
                'ArrowRight': [6, 4], 'Tab': [6, 5], 'Escape': [6, 6], 'Enter': [6, 7],

                // PA7
                'F1': [7, 0], 'F2': [7, 1], 'F3': [7, 2], 'F4': [7, 3], 'F5': [7, 4],
                'Pause': [7, 7], // STOP key

                // PB0 (Modifiers)
                'ShiftLeft': [8, 0], 'ShiftRight': [8, 0],
                'ControlLeft': [8, 1], 'ControlRight': [8, 1],
                'AltLeft': [8, 2], 'AltRight': [8, 2], // Mapping Alt to the GRPH key
                'CapsLock': [8, 4]
            };

            // --- Event Listeners ---
            // We use e.preventDefault() on mapped keys so the browser doesn't scroll
            // the window when pressing Spacebar or the Arrow keys during gameplay.

            window.addEventListener('keydown', (e) => {
                const mappedKey = keyMap[e.code];
                if (mappedKey) {
                    e.preventDefault();
                    // mappedKey[0] = row, mappedKey[1] = col, 1 = true (pressed)
                    set_key_state(mappedKey[0], mappedKey[1], 1);
                }
            });

            window.addEventListener('keyup', (e) => {
                const mappedKey = keyMap[e.code];
                if (mappedKey) {
                    e.preventDefault();
                    // mappedKey[0] = row, mappedKey[1] = col, 0 = false (released)
                    set_key_state(mappedKey[0], mappedKey[1], 0);
                }
            });

            (function renderLoop(timeNow) {
                // Run 500 emulated 8085 instructions per browser animation frame
                let deltaTime = timeNow - timeLast;
                if (deltaTime > 0.1) deltaTime = 0.1;

                const systemClockFreq = 2457600;
                const numClockPeriods = Math.max(0, systemClockFreq * deltaTime - clockPeriodDebt);
                clockPeriodDebt = run_frame(numClockPeriods) - numClockPeriods;

                // Read the updated canvas pixels right out of Wasm shared memory

                const pixelView = new Uint8ClampedArray(memory.buffer, bufferPointer, bufferLength);
                imgData.data.set(pixelView);
                ctx.putImageData(imgData, 0, 0);

                requestAnimationFrame(renderLoop);
            })(timeLast);
        }

        initWasm();
    </script>
</body>
</html>
